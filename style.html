<style>
  /* ── Tokens ── */
  :root {
    --bg: #09080f;
    --bg2: #0f0d1a;
    --bg3: #141228;
    --line: #251f3d;
    --accent: #a855f7;
    --accent2: #c084fc;
    --glow: rgba(168, 85, 247, 0.2);
    --text: #d4c8ec;
    --muted: #6b5a8a;
    --white: #f3eeff;
    --mono: 'JetBrains Mono', monospace;
    --serif: 'DM Serif Display', serif;
    --sans: 'Manrope', sans-serif;
  }

  /* ── Reset ── */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.7;
    cursor: none;
    overflow-x: hidden;
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed;
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition:
      width 0.2s,
      height 0.2s,
      background 0.2s;
    mix-blend-mode: screen;
  }

  #cursor-ring {
    position: fixed;
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--accent2);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    opacity: 0.5;
  }

  body.hovering #cursor {
    width: 18px;
    height: 18px;
    background: var(--accent2);
  }

  body.hovering #cursor-ring {
    width: 54px;
    height: 54px;
    border-color: var(--accent);
    opacity: 0.25;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 1000;
  }

  /* ── Nav ── */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 60px;
    background: linear-gradient(to bottom, rgba(9, 8, 15, 0.96), transparent);
    backdrop-filter: blur(4px);
  }

  .nav-logo {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    opacity: 0.9;
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--accent);
    transition: width 0.3s;
  }

  .nav-links a:hover {
    color: var(--accent2);
  }

  .nav-links a:hover::after {
    width: 100%;
  }

  /* ── Hero ── */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 120px 60px 80px;
    position: relative;
    overflow: hidden;
  }

  #hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 30%, transparent 100%);
    opacity: 0.35;
    animation: grid-drift 20s linear infinite;
  }

  #hero::after {
    content: '';
    position: absolute;
    top: 20%;
    left: 55%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: pulse-glow 6s ease-in-out infinite;
  }

  @keyframes grid-drift {
    0% {
      background-position:
        0 0,
        0 0;
    }

    100% {
      background-position:
        60px 60px,
        60px 60px;
    }
  }

  @keyframes pulse-glow {
    0%,
    100% {
      transform: scale(1);
      opacity: 0.6;
    }

    50% {
      transform: scale(1.15);
      opacity: 1;
    }
  }

  .hero-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    animation: fade-up 0.6s 0.2s forwards;
  }

  .hero-tag::before {
    content: '';
    display: inline-block;
    width: 28px;
    height: 1px;
    background: var(--accent);
  }

  .hero-name {
    font-family: var(--serif);
    font-size: clamp(52px, 8vw, 96px);
    color: var(--white);
    line-height: 1;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fade-up 0.7s 0.35s forwards;
  }

  .hero-name em {
    font-style: italic;
    color: var(--accent2);
  }

  .hero-role {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0;
    animation: fade-up 0.7s 0.5s forwards;
  }

  .blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    vertical-align: middle;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%,
    100% {
      opacity: 1;
    }

    50% {
      opacity: 0;
    }
  }

  .hero-links {
    display: flex;
    gap: 12px;
    margin-top: 48px;
    opacity: 0;
    animation: fade-up 0.7s 0.65s forwards;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-decoration: none;
    text-transform: uppercase;
    transition: all 0.25s;
    position: relative;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
  }

  .btn-primary:hover {
    background: var(--accent2);
    border-color: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(168, 85, 247, 0.4);
  }

  .btn-ghost {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--line);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(168, 85, 247, 0.15);
  }

  @keyframes fade-up {
    from {
      opacity: 0;
      transform: translateY(24px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ── Sections ── */
  section {
    padding: 100px 60px;
    position: relative;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    width: 48px;
    height: 1px;
    background: var(--accent);
    opacity: 0.5;
  }

  .section-title {
    font-family: var(--serif);
    font-size: clamp(32px, 4vw, 48px);
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 56px;
  }

  /* ── Skills ── */
  #skills {
    background: var(--bg2);
  }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 2px;
  }

  .skill-card {
    background: var(--bg3);
    padding: 32px;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
  }

  .skill-card:hover {
    background: #1a1230;
  }

  .skill-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 0;
    background: var(--accent);
    transition: height 0.4s ease;
  }

  .skill-card:hover::before {
    height: 100%;
  }

  .skill-card-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    background: rgba(168, 85, 247, 0.08);
    border: 1px solid rgba(168, 85, 247, 0.2);
    padding: 4px 12px;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .tag:hover {
    background: rgba(168, 85, 247, 0.2);
    border-color: var(--accent);
    color: var(--white);
    transform: translateY(-1px);
  }

  /* ── Experience ── */
  #experience {
    background: var(--bg);
  }

  .exp-list {
    border-left: 1px solid var(--line);
    padding-left: 40px;
    margin-left: 12px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .exp-item {
    position: relative;
    padding-bottom: 52px;
    opacity: 0;
    transform: translateX(-16px);
    transition:
      opacity 0.5s,
      transform 0.5s;
  }

  .exp-item.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .exp-item:last-child {
    padding-bottom: 0;
  }

  .exp-item::before {
    content: '';
    position: absolute;
    left: -46px;
    top: 6px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
    transition:
      background 0.3s,
      box-shadow 0.3s;
  }

  .exp-item:hover::before {
    background: var(--accent);
    box-shadow: 0 0 16px var(--glow);
  }

  .exp-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }

  .exp-title {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--white);
    margin-bottom: 4px;
  }

  .exp-company {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .exp-bullets {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .exp-bullets li {
    font-size: 13.5px;
    color: var(--text);
    padding-left: 20px;
    position: relative;
    max-width: 680px;
  }

  .exp-bullets li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-family: var(--mono);
  }

  /* ── Education ── */
  #education {
    background: var(--bg2);
  }

  .edu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2px;
  }

  .edu-card {
    background: var(--bg3);
    padding: 32px;
    transition: background 0.3s;
    position: relative;
    overflow: hidden;
  }

  .edu-card:hover {
    background: #1a1230;
  }

  .edu-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 0;
    background: var(--accent);
    transition: height 0.4s ease;
  }

  .edu-card:hover::before {
    height: 100%;
  }

  .edu-year {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-bottom: 16px;
  }

  .edu-degree {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .edu-school {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Contact ── */
  #contact {
    background: var(--bg);
    text-align: center;
    padding: 120px 60px;
  }

  #contact .section-label {
    justify-content: center;
  }

  #contact .section-label::after {
    display: none;
  }

  .contact-title {
    font-family: var(--serif);
    font-size: clamp(40px, 5vw, 64px);
    color: var(--white);
    margin-bottom: 16px;
  }

  .contact-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 48px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
  }

  .contact-links {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--line);
    padding: 24px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer span {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── Scroll reveal ── */
  .reveal {
    opacity: 0;
    transform: translateY(32px);
    transition:
      opacity 0.6s ease,
      transform 0.6s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar {
    width: 4px;
  }

  ::-webkit-scrollbar-track {
    background: var(--bg);
  }

  ::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 2px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(168, 85, 247, 0.3);
    color: var(--white);
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    nav {
      padding: 18px 24px;
    }

    .nav-links {
      gap: 20px;
    }

    section {
      padding: 72px 24px;
    }

    #hero {
      padding: 100px 24px 60px;
    }

    footer {
      padding: 20px 24px;
      flex-direction: column;
      gap: 8px;
      text-align: center;
    }

    #contact {
      padding: 80px 24px;
    }
  }

  @media (max-width: 480px) {
    .nav-links {
      display: none;
    }
  }
</style>
